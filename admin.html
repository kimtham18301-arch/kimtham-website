<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Admin | Kim Thắm</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="admin.css?v=20260501-contact-sync">
</head>
<body class="admin-body">
    <!-- TOAST NOTIFICATIONS -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- CONFIRM DIALOG -->
    <div class="modal-overlay" id="confirmModal" hidden>
        <div class="modal-dialog">
            <div class="modal-icon">⚠️</div>
            <h3 id="confirmTitle">Xác nhận</h3>
            <p id="confirmMessage">Bạn có chắc chắn?</p>
            <div class="modal-actions">
                <button class="btn btn--ghost" id="confirmCancel">Hủy</button>
                <button class="btn btn--danger" id="confirmOk">Xác nhận</button>
            </div>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-brand">
                <span class="login-logo">K</span>
                <h1>Kim Thắm</h1>
                <p>Bảng quản trị nội dung</p>
            </div>
            <form id="loginForm">
                <label>
                    <span>Tài khoản</span>
                    <input type="text" name="username" autocomplete="username" required placeholder="admin">
                </label>
                <label>
                    <span>Mật khẩu</span>
                    <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••">
                </label>
                <button class="btn btn--primary btn--full" type="submit">Đăng nhập</button>
                <p class="login-status" id="loginStatus"></p>
            </form>
        </div>
    </div>

    <!-- ADMIN SHELL -->
    <div class="admin-shell" id="adminShell" hidden>
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-logo">K</span>
                <span class="sidebar-name">Kim Thắm</span>
                <button class="sidebar-close" id="sidebarClose" aria-label="Đóng menu">✕</button>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <a href="#/dashboard" class="sidebar-link active" data-route="dashboard">
                    <span class="sidebar-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <div class="sidebar-section">Nội dung</div>
                <a href="#/blogs" class="sidebar-link" data-route="blogs">
                    <span class="sidebar-icon">✍️</span>
                    <span>Blog</span>
                </a>
                <a href="#/portfolio" class="sidebar-link" data-route="portfolio">
                    <span class="sidebar-icon">💼</span>
                    <span>Portfolio</span>
                </a>
                <a href="#/products" class="sidebar-link" data-route="products">
                    <span class="sidebar-icon">🌸</span>
                    <span>Store</span>
                </a>
                <a href="#/pages" class="sidebar-link" data-route="pages">
                    <span class="sidebar-icon">📄</span>
                    <span>Trang</span>
                </a>
                <div class="sidebar-section">Quản lý</div>
                <a href="#/leads" class="sidebar-link" data-route="leads">
                    <span class="sidebar-icon">📬</span>
                    <span>Leads</span>
                </a>
                <a href="#/media" class="sidebar-link" data-route="media">
                    <span class="sidebar-icon">🖼️</span>
                    <span>Media</span>
                </a>
                <a href="#/settings" class="sidebar-link" data-route="settings">
                    <span class="sidebar-icon">⚙️</span>
                    <span>Cài đặt</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-link" target="_blank">
                    <span class="sidebar-icon">🌐</span>
                    <span>Xem website</span>
                </a>
                <button class="sidebar-link sidebar-logout" id="logoutBtn">
                    <span class="sidebar-icon">🚪</span>
                    <span>Đăng xuất</span>
                </button>
            </div>
        </aside>

        <!-- MOBILE TOP BAR -->
        <header class="topbar" id="topbar">
            <button class="topbar-toggle" id="sidebarToggle" aria-label="Mở menu">
                <span></span><span></span><span></span>
            </button>
            <span class="topbar-title" id="topbarTitle">Dashboard</span>
            <a href="index.html" class="topbar-site" target="_blank">🌐</a>
        </header>

        <!-- MAIN CONTENT -->
        <main class="admin-main" id="adminMain">
            <!-- Content injected by router -->
        </main>
    </div>

    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="admin-core.js?v=20260501-contact-sync"></script>
    <script src="admin-modules.js?v=20260501-contact-sync"></script>
    <script src="admin-app.js?v=20260501-contact-sync"></script>
</body>
</html>
