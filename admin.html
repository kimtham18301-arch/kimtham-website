<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Kim Thắm Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
    <header class="site-header">
        <nav class="navbar" aria-label="Điều hướng admin">
            <a class="brand" href="index.html">Kim Thắm</a>
            <div class="admin-nav-actions">
                <a class="btn secondary" href="index.html">Xem website</a>
            </div>
        </nav>
    </header>

    <main class="admin-shell">
        <section class="admin-hero">
            <div>
                <p class="eyebrow">Bảng quản trị</p>
                <h1>Quản lý nội dung website</h1>
                <p>Thêm hoặc sửa thông tin chính của portfolio. Dữ liệu được lưu trên trình duyệt hiện tại.</p>
            </div>
            <div class="admin-status" id="adminStatus" role="status">Chưa có thay đổi</div>
        </section>

        <form class="admin-form" id="contentForm">
            <section class="admin-panel">
                <h2>Trang chủ</h2>
                <label>
                    Dòng mô tả nhỏ
                    <input type="text" name="heroEyebrow" placeholder="Digital Marketing Intern / Content & Social Media">
                </label>
                <label>
                    Tên hiển thị
                    <input type="text" name="heroTitle" placeholder="Kim Thắm">
                </label>
                <label>
                    Mô tả chính
                    <textarea name="heroLead" rows="4" placeholder="Viết lời giới thiệu ngắn trên đầu trang"></textarea>
                </label>
                <label>
                    Tên trên thẻ cá nhân
                    <input type="text" name="profileName" placeholder="Kim Thắm">
                </label>
                <label>
                    Tóm tắt trên thẻ cá nhân
                    <input type="text" name="profileSummary" placeholder="Content Marketing • Social Media • SEO cơ bản">
                </label>
            </section>

            <section class="admin-panel">
                <h2>Giới thiệu</h2>
                <label>
                    Tiêu đề phần giới thiệu
                    <textarea name="aboutTitle" rows="3" placeholder="Hồ sơ cá nhân rõ ràng..."></textarea>
                </label>
                <label>
                    Đoạn giới thiệu 1
                    <textarea name="aboutParagraph1" rows="5" placeholder="Viết đoạn giới thiệu đầu tiên"></textarea>
                </label>
                <label>
                    Đoạn giới thiệu 2
                    <textarea name="aboutParagraph2" rows="5" placeholder="Viết đoạn giới thiệu thứ hai"></textarea>
                </label>
            </section>

            <section class="admin-panel">
                <h2>Liên hệ</h2>
                <label>
                    Email
                    <input type="email" name="email" placeholder="your-email@gmail.com">
                </label>
                <label>
                    Số điện thoại
                    <input type="tel" name="phone" placeholder="0972295710">
                </label>
                <label>
                    Facebook
                    <input type="url" name="facebook" placeholder="https://facebook.com/yourname">
                </label>
                <label>
                    LinkedIn
                    <input type="url" name="linkedin" placeholder="https://linkedin.com/in/yourname">
                </label>
            </section>

            <div class="admin-actions">
                <button class="btn primary" type="submit">Lưu nội dung</button>
                <button class="btn secondary" type="button" id="loadDemo">Điền mẫu</button>
                <button class="btn ghost" type="button" id="resetContent">Xóa dữ liệu đã lưu</button>
            </div>
        </form>
    </main>

    <script src="admin.js"></script>
</body>
</html>
